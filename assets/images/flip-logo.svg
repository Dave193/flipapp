<svg width="500" height="500" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flip App Logo</title>
  <desc>A bold geometric logo featuring two mirrored F letterforms forming a stylized flip symbol, with the wordmark FLIP below</desc>

  <!-- Background card -->
  <rect x="0" y="0" width="500" height="500" rx="48" fill="#1A1A2E"/>

  <!-- Top-left F shape (purple) -->
  <g transform="translate(148, 110)">
    <rect x="0" y="0" width="22" height="110" rx="6" fill="#6C63FF"/>
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#6C63FF"/>
    <rect x="0" y="46" width="56" height="20" rx="6" fill="#A78BFA"/>
  </g>

  <!-- Bottom-right F shape mirrored (orange) -->
  <g transform="translate(352, 280) rotate(180)">
    <rect x="0" y="0" width="22" height="110" rx="6" fill="#F97316"/>
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#F97316"/>
    <rect x="0" y="46" width="56" height="20" rx="6" fill="#FB923C"/>
  </g>

  <!-- Center connector dot -->
  <circle cx="250" cy="245" r="10" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="250" cy="245" r="5" fill="#FFFFFF" opacity="0.55"/>

  <!-- Wordmark -->
  <text
    x="250"
    y="390"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="600"
    font-size="48"
    letter-spacing="14"
    fill="#FFFFFF">FLIP</text>

  <!-- Tagline -->
  <text
    x="250"
    y="430"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="16"
    letter-spacing="5"
    fill="#A0A0C0">PRODUCT MANAGER</text>

</svg>
